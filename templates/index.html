<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a18;
        }

        .card {
            background: #fff;
            border: 0.5px solid rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
        }

        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 0.5px solid rgba(0,0,0,0.15);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #888780;
            border-bottom: 2px solid transparent;
            margin-bottom: -0.5px;
        }

        .tab.active {
            color: #1a1a18;
            border-bottom: 2px solid #1a1a18;
        }

        h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 14px;
            color: #888780;
            margin-bottom: 1.5rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 1rem;
        }

        label {
            font-size: 13px;
            color: #888780;
        }

        input {
            background: #f5f5f3;
            border: 0.5px solid rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 15px;
            color: #1a1a18;
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: rgba(0,0,0,0.4);
            background: #fff;
        }

        .btn {
            width: 100%;
            background: #1a1a18;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            margin-top: 0.5rem;
        }

        .btn:hover { background: #2c2c2a; }
        .btn:active { transform: scale(0.99); }

        .error {
            font-size: 13px;
            color: #e24b4a;
            margin-top: 0.75rem;
            min-height: 20px;
        }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>
<div class="card">
    <div class="tabs">
        <div class="tab active" onclick="show('login')">Вход</div>
        <div class="tab" onclick="show('register')">Регистрация</div>
    </div>

    <div class="view active" id="login-view">
        <h2>Добро пожаловать</h2>
        <p class="subtitle">Введи логин и пароль</p>

        <div class="field">
            <label>Логин</label>
            <input type="text" id="login-username" placeholder="имя пользователя" />
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="login-password" placeholder="••••••••" />
        </div>

        <button class="btn" onclick="login()">Войти</button>
        <p class="error" id="login-error"></p>
    </div>

    <div class="view" id="register-view">
        <h2>Создай аккаунт</h2>
        <p class="subtitle">Заполни данные для регистрации</p>

        <div class="field">
            <label>Логин</label>
            <input type="text" id="reg-username" placeholder="имя пользователя" />
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="reg-password" placeholder="••••••••" />
        </div>

        <button class="btn" onclick="register()">Создать аккаунт</button>
        <p class="error" id="reg-error"></p>
    </div>
</div>

<script>
    function show(view) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(view + '-view').classList.add('active');
        document.querySelectorAll('.tab')[view === 'login' ? 0 : 1].classList.add('active');
        document.getElementById(view === 'login' ? 'login-error' : 'reg-error').textContent = '';
    }

    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const errorEl = document.getElementById('login-error');

        if (!username || !password) {
            errorEl.textContent = 'Заполни все поля';
            return;
        }

        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('token', data.token)
            window.location.href = '/tasks';
        } else {
            const text = await res.text();
            errorEl.textContent = text || 'Неверный логин или пароль';
        }
    }

    async function register() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value.trim();
        const errorEl = document.getElementById('reg-error');

        if (!username || !password) {
            errorEl.textContent = 'Заполни все поля';
            return;
        }

        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('token', data.token);
            window.location.href = '/tasks';
        } else {
            const text = await res.text();
            errorEl.textContent = text || 'Ошибка регистрации';
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const activeView = document.querySelector('.view.active').id;
        activeView === 'login-view' ? login() : register();
    });
</script>
</body>
</html>
